# --------------------------------------------------------------------------------
# Accounts
#
# Each account speaks exactly one backend. The blocks below show every
# supported backend as its own account; keep the ones you need. Secrets accept
# either a `command` (a shell command line string run through the platform
# shell, or a program + args list) or a `raw` plaintext value. OAuth 2.0 access
# tokens are typically issued and refreshed by an external tool such as `ortie`.
# --------------------------------------------------------------------------------

# --------------------------------------------------------------------------------
# Vdir backend
#
# Local addressbook collections stored on disk; see
# <https://vdirsyncer.pimutils.org/en/stable/vdir.html>. Each immediate
# subdirectory of `home-dir` is one addressbook.
# --------------------------------------------------------------------------------

[accounts.vdir-example]
# When `--account` is missing, use this account as the default one.
default = true
vdir.home-dir = "~/.local/share/vdirsyncer/contacts"

# --------------------------------------------------------------------------------
# CardDAV backend
#
# The addressbook home set is resolved from the first of these that is set, in
# order of precedence:
#
# 1. `carddav.home`: pre-resolved addressbook home set URL; every discovery
#    step is skipped. Fastest, least safe.
# 2. `carddav.server`: principal + home-set discovery start from the given
#    context root. Skips domain resolution. Accepts a full URL, a bare domain,
#    or `domain:port`; bare authorities default to `https://`.
# 3. `carddav.discover`: a bare domain resolved to a server URL at runtime
#    (PACC, then `.well-known`, then RFC 6764 SRV last), then principal +
#    home-set discovery. Convenient but adds DNS + HTTP round-trips on every run.
#
# The wizard records both `discover` and `server`: `server` wins, and `discover`
# stays as a fallback to re-resolve from.
# --------------------------------------------------------------------------------

[accounts.carddav-example]
carddav.discover = "example.org"
carddav.server = "https://carddav.example.org/dav/addressbooks"
#carddav.home = "https://carddav.example.org/dav/addressbooks/user/me/default"

# Basic authentication (RFC 7617).
carddav.auth.basic.username = "username"
carddav.auth.basic.password.command = "pass show example"
#carddav.auth.basic.password.command = ["pass", "show", "example"]
#carddav.auth.basic.password.raw = "password"

# Bearer authentication (RFC 6750), mainly for OAuth 2.0.
#carddav.auth.bearer.token.command = "ortie token show"
#carddav.auth.bearer.token.raw = "oauth2-token"

# TLS configuration.
#carddav.tls.provider = "rustls"
#carddav.tls.rustls.crypto = "ring"
#carddav.tls.cert = "/etc/ssl/certs/ca-certificates.crt"

# --------------------------------------------------------------------------------
# JMAP backend (RFC 8620 + RFC 9610)
#
# `server` accepts a bare authority (discovered via `GET /.well-known/jmap`) or
# a full session URL. Authentication is one of `header` (raw Authorization
# value), `bearer` (token) or `basic` (username + password).
# --------------------------------------------------------------------------------

[accounts.jmap-example]
jmap.server = "fastmail.com"
#jmap.server = "https://api.fastmail.com/jmap/session"

jmap.auth.bearer.token.command = "ortie token show"
#jmap.auth.header.raw = "Bearer oauth2-token"
#jmap.auth.basic.username = "username"
#jmap.auth.basic.password.command = "pass show example"

#jmap.tls.provider = "rustls"
#jmap.tls.rustls.crypto = "ring"

# --------------------------------------------------------------------------------
# Microsoft Graph backend
#
# The Graph API is OAuth 2.0 bearer-token only. `user-id` defaults to `me` (the
# authenticated user).
# --------------------------------------------------------------------------------

[accounts.msgraph-example]
#msgraph.user-id = "me"
msgraph.auth.token.command = "ortie token show"
#msgraph.auth.token.raw = "oauth2-token"

# --------------------------------------------------------------------------------
# Google People backend
#
# The People API is OAuth 2.0 bearer-token only.
# --------------------------------------------------------------------------------

[accounts.google-example]
google.auth.token.command = "ortie token show"
#google.auth.token.raw = "oauth2-token"
