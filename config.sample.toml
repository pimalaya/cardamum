# ================================================================================
# `cardamum` configuration file.
#
# Loaded from the first valid path among:
#   - $XDG_CONFIG_HOME/cardamum/config.toml
#   - $HOME/.config/cardamum/config.toml
#   - $HOME/.cardamumrc
#
# Override with `cardamum -c <PATH>` or `CARDAMUM_CONFIG=<PATH>`. Multiple paths
# can be passed at once, separated by `:`; the first one is the base and the
# rest are deep-merged on top of it.
#
# Run `cardamum` once with no config file to launch the wizard, which prompts
# for an account name, then lets you pick a backend. The recommended path is
# automatic discovery: enter your email address and the wizard searches every
# reachable contacts service (CardDAV, JMAP, plus the Google People and
# Microsoft Graph APIs for those providers) and lets you pick one. You can also
# configure a backend by hand (CardDAV, JMAP, Microsoft Graph, Google People, or
# local vdir). Every remote backend tests the connection before saving.
# `cardamum account configure --account <name>` can be used afterwards to edit
# (or add) an account through the same wizard.
# ================================================================================

